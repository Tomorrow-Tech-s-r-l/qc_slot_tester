name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── macOS executable ──────────────────────────────────────────────────────
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: |
          .venv/bin/pyinstaller --onefile --windowed \
            --collect-all customtkinter \
            --distpath build \
            --workpath /tmp/pyinstaller-build \
            --name QCSlotTester \
            app.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCSlotTester-macOS
          path: build/QCSlotTester.app

  # ── Windows executable ────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip.exe install --upgrade pip
          .venv\Scripts\pip.exe install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: |
          .venv\Scripts\pyinstaller.exe --onefile --windowed `
            --collect-all customtkinter `
            --distpath build `
            --workpath C:\Temp\pyinstaller-build `
            --name QCSlotTester `
            app.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCSlotTester-Windows
          path: build/QCSlotTester.exe

  # ── Arduino sketch verification ───────────────────────────────────────────
  verify-arduino:
    name: Verify Arduino Sketch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR=/usr/local/bin sh
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile sketch
        run: arduino-cli compile --fqbn arduino:avr:uno firmware
